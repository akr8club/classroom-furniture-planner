<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教室家具最適化Webアプリ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .section { margin-bottom: 40px; }
        .section h2 { color: #34495e; margin-bottom: 15px; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
        .input-group { display: flex; gap: 15px; align-items: end; flex-wrap: wrap; margin-bottom: 15px; }
        input[type="text"], input[type="number"], textarea { padding: 10px; border: 2px solid #ddd; border-radius: 6px; font-size: 14px; }
        input[type="text"] { width: 120px; }
        textarea { width: 100%; height: 120px; resize: vertical; }
        button { background: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.3s; }
        button:hover { background: #2980b9; transform: translateY(-1px); }
        button.danger { background: #e74c3c; }
        button.danger:hover { background: #c0392b; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px 4px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        th { background: #ecf0f1; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .room-col { width: 80px; background: #f8f9fa; }
        .floor-col { width: 60px; background: #f8f9fa; }
        .desk-col { width: 35px; }
        .chair-col { width: 35px; }
        .add-row { background: #27ae60; }
        .add-row:hover { background: #229954; }
        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .result-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; }
        .color-legend { display: flex; gap: 20px; margin: 20px 0; font-size: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 20px; height: 20px; border: 1px solid #ccc; }
        .surplus { background: #d5f4e6 !important; color: #27ae60; }
        .deficit { background: #fadbd8 !important; color: #e74c3c; }
        .moved { background: #fef9c7 !important; color: #f39c12; }
        .sufficient { background: #d1ecf1 !important; color: #3498db; }
        @media (max-width: 768px) { .results { grid-template-columns: 1fr; } .input-group { flex-direction: column; align-items: stretch; } }
        .scroll-x { overflow-x: auto; }
        input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏫 教室家具最適化Webアプリ</h1>
        
        <div class="section">
            <h2>📦 今年度在庫</h2>
            <div class="input-group">
                <button class="add-row" onclick="addRow('inventory')">[+行追加]</button>
                <textarea id="inventoryCSV" placeholder="CSV貼り付け (Excel→全選択→コピー→ここに貼り付け→読み込み)&#10;例: 101,2,12,10,8,6,4,2,1,0,15,12,10,8,6,4,2,1"></textarea>
                <button onclick="loadCSV('inventory')">CSV読み込み</button>
            </div>
            <div class="scroll-x">
                <table id="inventoryTable">
                    <thead><tr><th class="room-col">部屋名</th><th class="floor-col">階</th><th>机1</th><th>机2</th><th>机3</th><th>机4</th><th>机5</th><th>机6</th><th>机7</th><th>机8</th><th>椅1</th><th>椅2</th><th>椅3</th><th>椅4</th><th>椅5</th><th>椅6</th><th>椅7</th><th>椅8</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="section">
            <h2>📋 来年度必要数</h2>
            <div class="input-group">
                <button class="add-row" onclick="addRow('required')">[+行追加]</button>
                <textarea id="requiredCSV" placeholder="CSV貼り付け (Excel→全選択→コピー→ここに貼り付け→読み込み)&#10;例: 特別教室,2,0,0,5,3,2,1,0,0,0,0,8,5,3,2,1,0"></textarea>
                <button onclick="loadCSV('required')">CSV読み込み</button>
            </div>
            <div class="scroll-x">
                <table id="requiredTable">
                    <thead><tr><th class="room-col">部屋名</th><th class="floor-col">階</th><th>机1</th><th>机2</th><th>机3</th><th>机4</th><th>机5</th><th>机6</th><th>机7</th><th>机8</th><th>椅1</th><th>椅2</th><th>椅3</th><th>椅4</th><th>椅5</th><th>椅6</th><th>椅7</th><th>椅8</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div style="text-align: center; margin: 40px 0;">
            <button onclick="optimize()" style="padding: 15px 40px; font-size: 16px;">🚀 最適化計算実行</button>
            <button class="danger" onclick="clearAll()" style="margin-left: 15px;">🔄 全クリア</button>
        </div>

        <div id="results" style="display: none;">
            <div class="color-legend">
                <div class="legend-item"><div class="legend-color surplus"></div>余剰(緑)</div>
                <div class="legend-item"><div class="legend-color deficit"></div>不足(赤)</div>
                <div class="legend-item"><div class="legend-color sufficient"></div>充足(青)</div>
            </div>
            <div class="results">
                <div class="result-panel">
                    <h3>📊 最適化プラン (距離優先/最小台数/最小階移動)</h3>
                    <div id="plans"></div>
                </div>
                <div class="result-panel">
                    <h3>📈 発注・倉庫戻し</h3>
                    <div id="orders"></div>
                </div>
            </div>
            <div class="result-panel" style="margin-top: 20px;">
                <h3>🎯 移動前後比較表</h3>
                <div id="comparison" class="scroll-x"></div>
            </div>
            <div style="text-align: center; margin-top: 30px;">
                <button onclick="downloadCSV()" style="padding: 12px 32px;">💾 全結果CSVダウンロード</button>
            </div>
        </div>
    </div>

    <script>
        let inventoryData = {};
        let requiredData = {};

        // テーブルにCtrl+V貼り付け対応（修正版）
        document.addEventListener('paste', function(e) {
            const active = document.activeElement;
            if (!active || active.tagName !== 'INPUT') return;
            
            const table = active.closest('table');
            if (!table || !['inventoryTable', 'requiredTable'].includes(table.id)) return;

            e.preventDefault();
            const clipboardData = e.clipboardData || window.clipboardData;
            const text = clipboardData.getData('text');
            const lines = text.split('\n').filter(line => line.trim()).map(line => 
                line.split(/\t|,/).map(cell => cell.trim().replace(/"/g, ''))
            );

            const tbody = table.tBodies[0];
            const cellIndex = Array.from(active.parentElement.cells).indexOf(active.parentElement);
            const rowIndex = Array.from(tbody.rows).indexOf(active.parentElement.parentElement);

            lines.forEach((line, lineIdx) => {
                let targetRowIdx = rowIndex + lineIdx;
                while (targetRowIdx >= tbody.rows.length) {
                    const tableType = table.id.replace('Table', '');
                    addRow(tableType);
                    targetRowIdx = tbody.rows.length - 1;
                }
                
                const targetRow = tbody.rows[targetRowIdx];
                line.forEach((cell, cellIdx) => {
                    const targetCellIdx = cellIndex + cellIdx;
                    if (targetCellIdx < targetRow.cells.length) {
                        const input = targetRow.cells[targetCellIdx].querySelector('input');
                        if (input) input.value = cell;
                    }
                });
            });
            
            const tableType = table.id.replace('Table', '');
            updateTotals(tableType);
        });

        // [+行追加]ボタン修正版 - 確実に最下部に空行追加
        function addRow(type) {
            const table = document.getElementById(type + 'Table').tBodies[0];
            const row = table.insertRow(-1); // 最下部に追加
            
            row.innerHTML = `
                <td class="room-col"><input type="text" placeholder="部屋名 (例: 101)" oninput="updateTotals('${type}')"></td>
                <td class="floor-col"><input type="text" placeholder="階 (例: 2)" oninput="updateTotals('${type}')"></td>
                ${Array(16).fill(0).map((_, i) => 
                    `<td${i<8 ? ' class="desk-col"' : ''}><input type="number" min="0" value="0" style="width:100%;padding:4px;font-size:11px;" oninput="updateTotals('${type}')"></td>`
                ).join('')}
            `;
            
            // 最新追加行の最初のinputにフォーカス
            row.cells[0].querySelector('input').focus();
            updateTotals(type);
        }

        function updateTotals(type) {
            const data = {};
            const table = document.getElementById(type + 'Table').tBodies[0];
            
            for (let row of table.rows) {
                const roomInput = row.cells[0].querySelector('input');
                const floorInput = row.cells[1].querySelector('input');
                const room = roomInput.value.trim();
                const floor = floorInput.value.trim();
                
                if (!room || !floor) continue;
                
                const key = `${room}|${floor}`;
                if (!data[key]) {
                    data[key] = { 
                        room, 
                        floor: parseInt(floor), 
                        desks: new Array(8).fill(0), 
                        chairs: new Array(8).fill(0) 
                    };
                }
                
                // 机1-8
                for (let i = 0; i < 8; i++) {
                    const val = parseInt(row.cells[2 + i].querySelector('input').value) || 0;
                    data[key].desks[i] += val;
                }
                // 椅1-8
                for (let i = 0; i < 8; i++) {
                    const val = parseInt(row.cells[10 + i].querySelector('input').value) || 0;
                    data[key].chairs[i] += val;
                }
            }
            
            if (type === 'inventory') inventoryData = data;
            else requiredData = data;
        }

        function loadCSV(type) {
            const csvText = document.getElementById(type + 'CSV').value.trim();
            if (!csvText) return;
            
            Papa.parse(csvText, {
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    const table = document.getElementById(type + 'Table');
                    table.tBodies[0].innerHTML = '';
                    
                    results.data.forEach(rowData => {
                        if (rowData.length < 18 || !rowData[0] || !rowData[1]) return;
                        
                        addRow(type);
                        const lastRow = table.tBodies[0].lastElementChild;
                        
                        // 部屋名、階
                        lastRow.cells[0].querySelector('input').value = rowData[0];
                        lastRow.cells[1].querySelector('input').value = rowData[1];
                        
                        // 机1-8
                        for (let i = 0; i < 8; i++) {
                            lastRow.cells[2 + i].querySelector('input').value = rowData[2 + i] || 0;
                        }
                        // 椅1-8
                        for (let i = 0; i < 8; i++) {
                            lastRow.cells[10 + i].querySelector('input').value = rowData[10 + i] || 0;
                        }
                    });
                    
                    updateTotals(type);
                    document.getElementById(type + 'CSV').value = '';
                }
            });
        }

        function clearAll() {
            if (!confirm('全データをクリアしますか？')) return;
            inventoryData = {}; requiredData = {};
            document.getElementById('inventoryTable').tBodies[0].innerHTML = '';
            document.getElementById('requiredTable').tBodies[0].innerHTML = '';
            document.getElementById('inventoryCSV').value = '';
            document.getElementById('requiredCSV').value = '';
            document.getElementById('results').style.display = 'none';
            addRow('inventory'); // 初期空行復元
            addRow('required');
        }

        function optimize() {
            updateTotals('inventory');
            updateTotals('required');
            
            if (Object.keys(inventoryData).length === 0) {
                alert('今年度在庫を入力してください');
                return;
            }
            if (Object.keys(requiredData).length === 0) {
                alert('来年度必要数を入力してください');
                return;
            }

            const plans = calculateOptimizations(inventoryData, requiredData);
            displayResults(plans);
        }

        function calculateOptimizations(inventory, required) {
            const plans = {
                distance: greedyOptimize(inventory, required, (from, to) => 
                    Math.abs(from.floor - to.floor) * 10 + Math.abs(from.total - to.total)
                ),
                minCount: greedyOptimize(inventory, required, () => Math.random()),
                minFloor: greedyOptimize(inventory, required, (from, to) => 
                    from.floor === to.floor ? 0 : 100
                )
            };

            // 共通のorders/returns計算
            plans.distance.orders = {};
            plans.distance.returns = {};
            
            Object.keys(required).forEach(room => {
                plans.distance.orders[room] = {
                    desks: required[room].desks.map((r, i) => Math.max(0, r - (inventory[room]?.desks[i] || 0))),
                    chairs: required[room].chairs.map((r, i) => Math.max(0, r - (inventory[room]?.chairs[i] || 0)))
                };
            });

            return plans;
        }

        function greedyOptimize(inventory, required, costFn) {
            const result = { moves: [] };
            const avail = JSON.parse(JSON.stringify(inventory));
            Object.keys(required).forEach(r => {
                if (!avail[r]) avail[r] = { desks: new Array(8).fill(0), chairs: new Array(8).fill(0), floor: 1 };
            });

            // 各部屋のtotal計算用
            Object.values(avail).forEach(room => {
                room.total = room.desks.reduce((a,b)=>a+b,0) + room.chairs.reduce((a,b)=>a+b);
            });

            Object.keys(required).forEach(toKey => {
                const toRoom = required[toKey];
                Object.keys(avail).forEach(fromKey => {
                    if (fromKey === toKey) return;
                    const fromRoom = avail[fromKey];
                    
                    for (let i = 0; i < 8; i++) {
                        const surplus = Math.max(0, fromRoom.desks[i] - (required[fromKey]?.desks[i] || 0));
                        const deficit = Math.max(0, toRoom.desks[i] - (avail[toKey]?.desks[i] || 0));
                        const move = Math.min(surplus, deficit);
                        if (move > 0) {
                            result.moves.push({ from: fromKey, to: toKey, type: `机${i+1}`, count: move });
                            fromRoom.desks[i] -= move;
                            avail[toKey].desks[i] += move;
                        }
                    }
                    for (let i = 0; i < 8; i++) {
                        const surplus = Math.max(0, fromRoom.chairs[i] - (required[fromKey]?.chairs[i] || 0));
                        const deficit = Math.max(0, toRoom.chairs[i] - (avail[toKey]?.chairs[i] || 0));
                        const move = Math.min(surplus, deficit);
                        if (move > 0) {
                            result.moves.push({ from: fromKey, to: toKey, type: `椅${i+1}`, count: move });
                            fromRoom.chairs[i] -= move;
                            avail[toKey].chairs[i] += move;
                        }
                    }
                });
            });

            return result;
        }

        function displayResults(plans) {
            // プラン表示
            let plansHtml = '';
            Object.entries(plans).forEach(([name, plan]) => {
                const label = name === 'distance' ? '距離優先' : name === 'minCount' ? '最小台数' : '最小階移動';
                plansHtml += `<div style="margin-bottom: 15px; padding: 10px; background: white; border-radius: 6px; border-left: 4px solid ${name === 'distance' ? '#3498db' : name === 'minCount' ? '#f39c12' : '#27ae60'};">
                    <strong>${label}</strong>: ${plan.moves.slice(0,8).map(m => `${m.from.split('|')[0]}→${m.to.split('|')[0]} ${m.type}×${m.count}`).join(' / ')}${plan.moves.length > 8 ? ` ...ほか${plan.moves.length-8}` : ''}
                </div>`;
            });
            document.getElementById('plans').innerHTML = plansHtml;

            // 発注/戻し
            let ordersHtml = '<table style="font-size:11px;width:100%;"><thead><tr><th>部屋</th><th>発注机1-8</th><th>発注椅1-8</th></tr></thead><tbody>';
            Object.entries(plans.distance.orders || {}).forEach(([room, order]) => {
                ordersHtml += `<tr><td>${room.split('|')[0]}</td><td>${order.desks.join('-')}</td><td>${order.chairs.join('-')}</td></tr>`;
            });
            ordersHtml += '</tbody></table>';
            document.getElementById('orders').innerHTML = ordersHtml;

            displayComparison();
            document.getElementById('results').style.display = 'block';
        }

        function displayComparison() {
            const rooms = [...new Set([...Object.keys(inventoryData), ...Object.keys(requiredData)])];
            let html = '<table style="font-size:11px;"><thead><tr><th>部屋</th>';
            for (let i = 1; i <= 8; i++) html += `<th>机${i}</th>`;
            for (let i = 1; i <= 8; i++) html += `<th>椅${i}</th></tr></thead><tbody>`;
            
            rooms.forEach(room => {
                const inv = inventoryData[room] || { desks: new Array(8).fill(0), chairs: new Array(8).fill(0) };
                const req = requiredData[room] || { desks: new Array(8).fill(0), chairs: new Array(8).fill(0) };
                
                html += `<tr><td>${room.split('|')[0]}</td>`;
                for (let i = 0; i < 8; i++) {
                    const diff = inv.desks[i] - req.desks[i];
                    const className = diff > 0 ? 'surplus' : diff < 0 ? 'deficit' : 'sufficient';
                    html += `<td class="${className}">${inv.desks[i]}(${diff >= 0 ? '+' : ''}${diff})</td>`;
                }
                for (let i = 0; i < 8; i++) {
                    const diff = inv.chairs[i] - req.chairs[i];
                    const className = diff > 0 ? 'surplus' : diff < 0 ? 'deficit' : 'sufficient';
                    html += `<td class="${className}">${inv.chairs[i]}(${diff >= 0 ? '+' : ''}${diff})</td>`;
                }
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('comparison').innerHTML = html;
        }

        function downloadCSV() {
            const csv = [
                ['部屋', '階', '机1-8', '椅1-8', '差分'],
                ...Object.entries(inventoryData).map(([k, v]) => [
                    v.room, v.floor, v.desks.join(','), v.chairs.join(','), 
                    v.desks.map((d,i) => d - (requiredData[k]?.desks[i] || 0)).join(',')
                ])
            ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `教室家具最適化_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        // ページ読み込み時に初期空行追加
        window.addEventListener('load', () => {
            addRow('inventory');
            addRow('required');
        });
    </script>
</body>
</html>
