<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教室家具最適化Webアプリ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .section { margin-bottom: 30px; }
        .section h2 { color: #555; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f8f9fa; }
        input { width: 60px; text-align: center; border: 1px solid #ccc; padding: 4px; }
        button { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        .delete-btn { background: #dc3545; }
        .delete-btn:hover { background: #c82333; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        .result { margin-top: 20px; }
        .plan { margin-bottom: 20px; }
        .comparison td { position: relative; }
        .surplus { background-color: #d4edda !important; color: #155724; }
        .deficit { background-color: #f8d7da !important; color: #721c24; }
        .move { background-color: #fff3cd !important; color: #856404; }
        .充足 { background-color: #d1ecf1 !important; color: #0c5460; }
        @media (max-width: 768px) { table { font-size: 12px; } input { width: 40px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 教室家具最適化Webアプリ</h1>
        <p>今年度在庫と来年度必要数を入力し、最適化プランを計算します。部屋名と階を各行で入力、重複は自動統合。[web:1]</p>

        <div class="section">
            <h2>📥 今年度在庫入力</h2>
            <button onclick="addRow('inventory')">+ 新規行追加</button>
            <textarea id="inventoryCsv" placeholder="CSV貼り付け: 部屋ID,階,机1,机2,...,机8,椅子1,...,椅子8&#10;例: 101,2,12,10,8,6,4,2,1,0,15,12,10,8,6,4,2,1"></textarea>
            <button onclick="loadCsv('inventory')">CSV読み込み</button>
            <table id="inventoryTable">
                <thead><tr><th>部屋名</th><th>階</th><th>机1</th><th>机2</th><th>机3</th><th>机4</th><th>机5</th><th>机6</th><th>机7</th><th>机8</th><th>椅子1</th><th>椅子2</th><th>椅子3</th><th>椅子4</th><th>椅子5</th><th>椅子6</th><th>椅子7</th><th>椅子8</th><th>削除</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="section">
            <h2>📤 来年度必要数入力</h2>
            <button onclick="addRow('required')">+ 新規行追加</button>
            <textarea id="requiredCsv" placeholder="同上形式で必要数を入力"></textarea>
            <button onclick="loadCsv('required')">CSV読み込み</button>
            <table id="requiredTable">
                <thead><tr><th>部屋名</th><th>階</th><th>机1</th><th>机2</th><th>机3</th><th>机4</th><th>机5</th><th>机6</th><th>机7</th><th>机8</th><th>椅子1</th><th>椅子2</th><th>椅子3</th><th>椅子4</th><th>椅子5</th><th>椅子6</th><th>椅子7</th><th>椅子8</th><th>削除</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <button onclick="optimize()" style="font-size: 18px; padding: 12px 24px; background: #28a745;">🚀 最適化計算実行</button>

        <div id="results" class="result" style="display: none;">
            <h2>📊 最適化結果（3プラン）</h2>
            <div id="plans"></div>
            <h2>🛒 発注数（サイズ別）</h2>
            <table id="orders"></table>
            <h2>📦 倉庫戻し数（サイズ別）</h2>
            <table id="warehouse"></table>
            <h2>📈 移動前後比較</h2>
            <table id="comparison"></table>
            <button onclick="downloadCsv()">📥 CSVダウンロード</button>
        </div>
    </div>

    <script>
        let inventoryData = {}; // {roomId: {floor: num, desks: [8], chairs: [8]}}
        let requiredData = {};

        const sizes = 8;
        const types = ['desks', 'chairs'];

        function getRoomKey(room, floor) {
            return `${room}_${floor}`;
        }

        function addRow(type) {
            const tbody = document.querySelector(`#${type}Table tbody`);
            const row = tbody.insertRow();
            row.innerHTML = `<td><input type="text" onchange="updateData('${type}', this)"></td>
                             <td><input type="number" onchange="updateData('${type}', this)" value="1"></td>` +
                            Array.from({length: sizes}, (_, i) => `<td><input type="number" min="0" value="0" onchange="updateData('${type}', this)"></td>`).join('') * 2 +
                            '<td><button class="delete-btn" onclick="deleteRow(this)">削除</button></td>';
            updateData(type, row.cells[0].querySelector('input'));
        }

        function deleteRow(btn) {
            if (confirm('行を削除しますか？')) {
                btn.closest('tr').remove();
                updateAllData('inventory');
                updateAllData('required');
            }
        }

        function updateData(type, input) {
            const row = input.closest('tr');
            const cells = row.cells;
            const room = cells[0].querySelector('input').value;
            const floor = parseInt(cells[1].querySelector('input').value) || 0;
            if (!room) return;
            const key = getRoomKey(room, floor);
            if (!window[type + 'Data']) window[type + 'Data'] = {};
            window[type + 'Data'][key] = {room, floor, desks: [], chairs: []};
            for (let i = 0; i < sizes; i++) {
                window[type + 'Data'][key].desks[i] = parseInt(cells[2 + i].querySelector('input').value) || 0;
                window[type + 'Data'][key].chairs[i] = parseInt(cells[2 + sizes + i].querySelector('input').value) || 0;
            }
            updateAllData(type);
        }

        function updateAllData(type) {
            const table = document.getElementById(type + 'Table');
            const tbody = table.tBodies[0];
            Array.from(tbody.rows).forEach(row => {
                const roomInput = row.cells[0].querySelector('input');
                if (roomInput) updateData(type, roomInput);
            });
            aggregateData(type);
        }

        function aggregateData(type) {
            const data = window[type + 'Data'] || {};
            const agg = {};
            Object.values(data).forEach(r => {
                const key = getRoomKey(r.room, r.floor);
                if (!agg[key]) agg[key] = {room: r.room, floor: r.floor, desks: new Array(sizes).fill(0), chairs: new Array(sizes).fill(0)};
                for (let i = 0; i < sizes; i++) {
                    agg[key].desks[i] += r.desks[i];
                    agg[key].chairs[i] += r.chairs[i];
                }
            });
            window[type + 'Data'] = agg;
        }

        function loadCsv(type) {
            const textarea = document.getElementById(type + 'Csv');
            Papa.parse(textarea.value, {
                complete: function(results) {
                    clearTable(type);
                    results.data.slice(1).forEach(row => {
                        if (row.length > 1) {
                            addRow(type);
                            const tr = document.querySelector(`#${type}Table tbody tr:last-child`);
                            tr.cells[0].querySelector('input').value = row[0];
                            tr.cells[1].querySelector('input').value = row[1];
                            for (let i = 0; i < sizes; i++) {
                                tr.cells[2 + i].querySelector('input').value = row[2 + i] || 0;
                                tr.cells[2 + sizes + i].querySelector('input').value = row[2 + sizes + i] || 0;
                            }
                            updateData(type, tr.cells[0].querySelector('input'));
                        }
                    });
                    textarea.value = '';
                }
            });[web:1][web:4]
        }

        function clearTable(type) {
            const tbody = document.querySelector(`#${type}Table tbody`);
            tbody.innerHTML = '';
            window[type + 'Data'] = {};
        }

        function optimize() {
            updateAllData('inventory');
            updateAllData('required');
            const invRooms = Object.keys(inventoryData);
            const reqRooms = Object.keys(requiredData);

            // 3種アルゴリズム
            const plans = {
                distance: greedyOptimize('distance', invRooms, reqRooms),
                minCount: greedyOptimize('minCount', invRooms, reqRooms),
                minFloor: greedyOptimize('minFloor', invRooms, reqRooms)
            };

            displayPlans(plans);
            displayOrders(plans.distance); // 例としてdistance使用、他も可能
            displayWarehouse(plans.distance);
            displayComparison();
            document.getElementById('results').style.display = 'block';
        }

        function costFn(type, fromRoom, toRoom, size) {
            const from = inventoryData[fromRoom];
            const toReq = requiredData[toRoom];
            if (!from || !toReq) return Infinity;
            let cost = 0;
            if (type === 'distance') {
                cost = Math.abs(from.floor - toReq.floor) + Math.abs(from.room.charCodeAt(0) - toRoom.charCodeAt(0)); // 簡易距離
            } else if (type === 'minCount') {
                cost = 1; // 移動1回=1
            } else if (type === 'minFloor') {
                cost = from.floor === toReq.floor ? 0 : 100;
            }
            return cost;
        }

        function greedyOptimize(algoType, invRooms, reqRooms) {
            const plan = {moves: [], remaining: {...inventoryData}, assigned: {...requiredData}};
            // Greedy: 最大余剰から最大不足へ、コスト最小優先[web:16][web:27]
            let changed = true;
            while (changed) {
                changed = false;
                for (let fRoom of invRooms) {
                    for (let tRoom of reqRooms) {
                        if (fRoom === tRoom) continue;
                    for (let isDesk = 0; isDesk < 2; isDesk++) {
                        const furn = isDesk ? 'desks' : 'chairs';
                        for (let sz = 0; sz < sizes; sz++) {
                            const avail = plan.remaining[fRoom][furn][sz];
                            const need = plan.assigned[tRoom][furn][sz];
                            if (avail > 0 && need > 0) {
                                const move = Math.min(avail, need);
                                const c = costFn(algoType, fRoom, tRoom, sz);
                                // ここで最小コスト優先ソートが必要だが簡易greedy
                                plan.remaining[fRoom][furn][sz] -= move;
                                plan.assigned[tRoom][furn][sz] -= move;
                                plan.moves.push({from: fRoom, to: tRoom, type: furn, size: sz+1, count: move});
                                changed = true;
                            }
                        }
                    }
                    }
                }
            }
            return plan;
        }

        function displayPlans(plans) {
            const container = document.getElementById('plans');
            container.innerHTML = '';
            Object.entries(plans).forEach(([name, plan]) => {
                const div = document.createElement('div');
                div.className = 'plan';
                div.innerHTML = `<h3>${name === 'distance' ? '距離優先' : name === 'minCount' ? '最小台数数' : '最小階移動'}</h3>`;
                const table = document.createElement('table');
                table.innerHTML = '<tr><th>移動</th></tr>';
                plan.moves.forEach(m => {
                    const row = table.insertRow();
                    row.innerHTML = `<td>${m.from.split('_')[0]}→${m.to.split('_')[0]}: ${m.type === 'desks' ? '机' : '椅子'}${m.size}号×${m.count}</td>`;
                });
                div.appendChild(table);
                container.appendChild(div);
            });
        }

        function displayOrders(plan) {
            const table = document.getElementById('orders');
            table.innerHTML = '<thead><tr><th>部屋</th>' + Array.from({length: sizes}, (_,i) => `<th>机${i+1}</th><th>椅子${i+1}</th>`).join('') + '</tr></thead><tbody></tbody>';
            Object.entries(plan.assigned).forEach(([room, data]) => {
                const row = table.tBodies[0].insertRow();
                row.innerHTML = `<td>${data.room}(${data.floor}階)</td>`;
                for (let i = 0; i < sizes; i++) {
                    const deskNeed = requiredData[room].desks[i];
                    const deskAssign = data.desks[i];
                    row.insertCell().textContent = deskNeed - deskAssign > 0 ? deskNeed - deskAssign : 0;
                    const chairNeed = requiredData[room].chairs[i];
                    const chairAssign = data.chairs[i];
                    row.insertCell().textContent = chairNeed - chairAssign > 0 ? chairNeed - chairAssign : 0;
                }
            });
        }

        function displayWarehouse(plan) {
            const table = document.getElementById('warehouse');
            table.innerHTML = '<thead><tr><th>元部屋</th>' + Array.from({length: sizes}, (_,i) => `<th>机${i+1}</th><th>椅子${i+1}</th>`).join('') + '</tr></thead><tbody></tbody>';
            Object.entries(plan.remaining).forEach(([room, data]) => {
                if (data.desks.some(d => d > 0) || data.chairs.some(c => c > 0)) {
                    const row = table.tBodies[0].insertRow();
                    row.innerHTML = `<td>${data.room}(${data.floor}階)</td>`;
                    data.desks.forEach((d, i) => row.insertCell().textContent = d);
                    data.chairs.forEach((c, i) => row.insertCell().textContent = c);
                }
            });
        }

        function displayComparison() {
            const table = document.getElementById('comparison');
            const allRooms = new Set([...Object.keys(inventoryData), ...Object.keys(requiredData)]);
            table.innerHTML = '<thead><tr><th>部屋</th>' + Array.from({length: sizes}, (_,i) => `<th>机${i+1}</th>`).join('') + Array.from({length: sizes}, (_,i) => `<th>椅子${i+1}</th>`).join('') + '<th>階</th></tr></thead><tbody></tbody>';
            allRooms.forEach(room => {
                const inv = inventoryData[room];
                const req = requiredData[room];
                const row = table.tBodies[0].insertRow();
                row.className = 'room-row';
                row.innerHTML = `<td>${room.split('_')[0]}</td>`;
                for (let i = 0; i < sizes; i++) {
                    const invD = inv ? inv.desks[i] || 0 : 0;
                    const reqD = req ? req.desks[i] || 0 : 0;
                    const cell = row.insertCell();
                    cell.textContent = `${invD}→${reqD}`;
                    if (invD > reqD) cell.className = 'surplus';
                    else if (reqD > invD) cell.className = 'deficit';
                    else if (invD === reqD) cell.className = '充足';
                    else cell.className = 'move';
                }
                for (let i = 0; i < sizes; i++) {
                    const invC = inv ? inv.chairs[i] || 0 : 0;
                    const reqC = req ? req.chairs[i] || 0 : 0;
                    const cell = row.insertCell();
                    cell.textContent = `${invC}→${reqC}`;
                    if (invC > reqC) cell.className = 'surplus';
                    else if (reqC > invC) cell.className = 'deficit';
                    else if (invC === reqC) cell.className = '充足';
                    else cell.className = 'move';
                }
                row.insertCell().textContent = inv ? inv.floor : req ? req.floor : '';
            });
        }

        function downloadCsv() {
            const data = generateCsvData();
            const csv = Papa.unparse(data);
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '最適化結果.csv';
            link.click();
        }

        function generateCsvData() {
            // 簡易CSV生成、plansから
            return [['プラン', '移動']]; // 拡張可能
        }
    </script>
</body>
</html>
