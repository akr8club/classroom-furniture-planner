            for(let f=1; f<=floorCt; f++) {

                    const roomId = rooms.length;
                    const roomName = `${f}F-${String(r).padStart(3,'0')}室`;
                    rooms.push({floor: `${f}F`, name: roomName});
                    
                    htmlCurrent += `<th colspan="8">${roomName}</th>`;

                    targetData[roomId] = {desk: 0, chair: 0};
                }
            }
            
            // サイズヘッダ
            for(let i=1; i<=8; i++) htmlCurrent += `<th>${i}号</th><th>合計</th>`;
            htmlCurrent += '</tr>';

            htmlChairTarget += '<td colspan="9">全サイズ合計</td></tr>';
            
            // 入力行生成 (簡略)
            document.getElementById('currentTables').innerHTML = htmlCurrent + htmlChairCurrent;
            document.getElementById('targetTables').innerHTML = htmlTarget + htmlChairTarget;
            // 実際は動的input追加
        }
        
        function parseCSV() {

            if(file) Papa.parse(file, {complete: (res) => loadCSVData(res.data)});
