<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>教室家具最適化アプリ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>table{border-collapse:collapse;}th,td{border:1px solid #ccc;padding:5px;} .move{background:#ff0;} .order{background:#f90;} .back{background:#9f9;}</style>
</head>
<body>
  <h1>教室家具移動最適化</h1>
  
  <section>
    <h3>今年度在庫入力</h3>
    <input type="file" id="csvCurrent" accept=".csv">
    <div contenteditable id="pasteCurrent">Excelコピペここ</div>
    <table id="tableCurrent"></table>
  </section>
  
  <section>
    <h3>来年度必要数</h3>
    <input type="file" id="csvNext" accept=".csv">
    <div contenteditable id="pasteNext">Excelコピペここ</div>
    <table id="tableNext"></table>
  </section>
  
  <button onclick="calculate()">計算</button>
  <div id="results"></div>

  <script>
    // テーブル生成・paste処理（詳細省略、web:20/21参照）
    document.querySelectorAll('div[contenteditable]').forEach(el => {
      el.addEventListener('paste', e => {
        e.preventDefault();
        const items = (e.clipboardData || window.clipboardData).items;
        // TSV parseしてテーブル更新
      });
    });
    
    // CSV処理
    document.getElementById('csvCurrent').addEventListener('change', e => loadCSV(e.target.files[0], 'current'));
    // loadCSV関数: Papa.parse使用 [web:29]
    
    // 最適化計算
    function calculate() {
      // データ抽出: rooms = {roomId: {floor, chair: [0-7], desk: [0-7]}}
      // 各サイズ・種類で最適化
      const moves = []; // 移動リスト
      const orders = {}; // 発注
      const backs = {}; // 戻し
      
      // 簡易最適化ロジック（全過剰から不足へ割り当て）
      Object.keys(rooms).forEach(room => {
        ['chair', 'desk'].forEach(type => {
          for(let size=1; size<=8; size++) {
            const idx = size-1;
            const current = currentData[room][type][idx];
            const need = nextData[room][type][idx];
            const diff = current - need;
            if(diff > 0) backs[`${room}-${type}-${size}`] = diff;
            else if(diff < 0) orders[`${room}-${type}-${size}`] = -diff;
          }
        });
      });
      // 詳細移動計算省略（供給過剰を不足にマッチ）
      
      // 結果表示
      document.getElementById('results').innerHTML = `
        <h3>移動計画</h3><pre>${moves.join('\n')}</pre>
        <h3>発注</h3><pre>${JSON.stringify(orders,null,2)}</pre>
        <h3>倉庫戻し</h3><pre>${JSON.stringify(backs,null,2)}</pre>
        <table id="compareTable">${generateCompareTable()}</table>
      `;
    }
  </script>
</body>
</html>
